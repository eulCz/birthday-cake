<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="sparkles"></div>

  <main class="container">
    <h1 class="title">Make a wish 🎂</h1>
    <p class="subtitle">Click the candle to blow it out</p>

    <div class="cake-scene">
      <div class="cake">
        <div class="plate"></div>

        <div class="layer layer-bottom"></div>
        <div class="layer layer-middle"></div>
        <div class="layer layer-top"></div>

        <div class="icing icing-drip1"></div>
        <div class="icing icing-drip2"></div>
        <div class="icing icing-drip3"></div>

        <div class="candle" id="candle">
          <div class="flame" id="flame"></div>
          <div class="smoke hidden" id="smoke">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>
      </div>
    </div>

    <button class="hint-btn" id="hintBtn">Blow the candle ✨</button>

    <section class="message hidden" id="message">
      <h2>Happy Birthday, liv 🎉</h2>
      <p>
        I made this little page for you.
        I hope your day is full of happy moments, good surprises,
        and lots of reasons to smile :)
      </p>
    </section>
  </main>

  <canvas id="confetti-canvas"></canvas>

  <script src="script.js"></script>
</body>

</html>
